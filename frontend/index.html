<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeeShop</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>
    <header>
        <button class="navigation">‹</button>
        <div id="date"></div>
        <button class="navigation">›</button>
        <button id="today">Сегодня</button>

        <div class="profile-menu">
            <button class="settings-btn" id="settingsBtn">
                <svg xmlns="http://w3.org" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
            </button>

            <div class="dropdown-menu" id="settingsDropdown">
                <button class="dropdown-item logout-btn" id="logoutBtn">
                    <svg xmlns="http://w3.org" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        style="margin-right: 8px;">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    Выйти из профиля
                </button>
            </div>

            <div class="avatar">
                <span id="userAvatarName">Сидоров Алексей</span>
            </div>
        </div>
    </header>

    <main>
        <h3>Управление сменами</h3>
        <div class="controls">
            <select id="nameInput"></select>
            с <select id="timeStart">
                <option value="8">08:00</option>
                <option value="12">12:00</option>
                <option value="15">15:00</option>
            </select>
            до <select id="timeEnd">
                <option value="15">15:00</option>
                <option value="18">18:00</option>
                <option value="22">22:00</option>

            </select>

            <button onclick="addShift()">Добавить</button>
        </div>

        <div id="timelineContainer"></div>
    </main>
</body>

</html>
