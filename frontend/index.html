<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeeShop</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>
    <header>
<button class="navigation" onclick="changeDate(-1)">&larr;</button>
        <div id="date"></div>
        <button class="navigation" onclick="changeDate(1)">&rarr;</button>
        <button id="today" onclick="goToToday()">Сегодня</button>       
        <button id="stats" onclick="showStats()"> Статистика</button>     
        <span id="currentUser" style="margin-left: auto; margin-right: 15px; font-weight: bold; color: #333;"></span>
        <button id="logout" onclick="logout()">Выйти</button>
    </header>

    <main>
        <h3>Управление сменами</h3>
        <div class="controls">
            <select id="nameInput"></select>
            с <select id="timeStart">
                <option value="8">08:00</option>
                <option value="12">12:00</option>
                <option value="15">15:00</option>
            </select>
            до <select id="timeEnd">
                <option value="15">15:00</option>
                <option value="18">18:00</option>
                <option value="22">22:00</option>

            </select>

            <button onclick="addShift()">Добавить</button>
        </div>

        <!-- Контейнер для шкал -->
        <div id="timelineContainer"></div>
    </main>
</body>

</html>
